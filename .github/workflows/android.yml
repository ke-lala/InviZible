name: Build My Custom InviZible
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码 (包含子模块)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 2. 设置环境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 强制开启 Jetifier (解决 Multidex 引用问题)
        # 这步操作会修改项目配置，强制将旧版 Android 支持库转换为 AndroidX
        run: |
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties

      - name: 4. 执行编译 (添加强制刷新参数)
        run: |
          chmod +x gradlew
          # --refresh-dependencies 确保 MultiDex 库被下载
          ./gradlew assembleDebug --refresh-dependencies -x lint -x test --no-daemon

      - name: 5. 提取 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: My-InviZible-App
          path: app/build/outputs/apk/debug/*.apk

      - name: 5. 提取 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: My-InviZible-App
          path: app/build/outputs/apk/debug/*.apk
