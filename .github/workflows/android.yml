name: Build My Custom InviZible
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码 (必须包含子模块)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 2. 强制锁定 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 强制安装项目匹配的 NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"
          # 设置环境变量供 Gradle 读取
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: 4. 执行编译 (添加跳过错误参数)
        run: |
          chmod +x gradlew
          # -x lint: 跳过耗时且易报错的代码扫描
          # -Pandroid.quiet: 减少无关日志
          ./gradlew assembleDebug -x lint -x test --no-daemon --stacktrace
        env:
          # 显式告知 Gradle NDK 位置，防止其寻找最新版导致不兼容
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK_HOME }}

      - name: 5. 提取 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: My-InviZible-App
          path: app/build/outputs/apk/debug/*.apk
