name: Build InviZible Pro
on:
  workflow_dispatch: # 允许你点击按钮手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 关键：必须拉取 Tor/DNSCrypt 等子模块

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 授予执行权限
        run: chmod +x gradlew

      - name: 编译 Debug APK
        # InviZible 包含本地代码，编译可能需要 10 分钟以上
        run: ./gradlew assembleDebug --stacktrace

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: InviZible-Build-APK
          path: app/build/outputs/apk/debug/*.apk
