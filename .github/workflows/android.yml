name: Build My Custom InviZible
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 2. 设置环境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 【核心修复】强制注入 Multidex 依赖
        run: |
          # 向 tordnscrypt 模块的 build.gradle 强行插入 multidex 依赖项
          # 我们在 dependencies 块的开头插入这行
          sed -i '/dependencies {/a \    implementation "androidx.multidex:multidex:2.0.1"' tordnscrypt/build.gradle
          
          # 同时确保全局开启 AndroidX
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: 4. 修复 NDK (InviZible 编译必须)
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"

      - name: 5. 执行编译
        run: |
          chmod +x gradlew
          # 使用 --no-daemon 确保内存稳定
          ./gradlew :app:assembleDebug -x lint -x test --no-daemon

      - name: 6. 提取 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: My-InviZible-App
          path: app/build/outputs/apk/debug/*.apk
