name: Build My Custom InviZible
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码 (包含所有子模块)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 2. 强制锁定 JDK 17 (防止自动升级到 21+)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. 修复 NDK 环境 (InviZible 编译核心)
        run: |
          # 确保安装项目所需的特定 NDK 版本
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"

      - name: 4. 使用 Gradle Wrapper 构建 (关键)
        run: |
          chmod +x gradlew
          # 使用 --no-daemon 避免内存泄漏，同时跳过配置缓存以防冲突
          ./gradlew assembleDebug --no-daemon --no-configuration-cache

      - name: 5. 提取 APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: My-InviZible-App
          path: app/build/outputs/apk/debug/*.apk
